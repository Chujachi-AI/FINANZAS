.logo{font-size:20px;font-weight:700;letter-spacing:-.5px}.logo span{color:#8b7355;font-weight:400}
.nav{display:flex;gap:3px;flex-wrap:wrap}
.nav-btn{padding:6px 13px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:400;background:transparent;color:#888;transition:all .2s;white-space:nowrap}

.inp{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #ddd;font-size:13px;outline:none;background:#fafaf8}
.sel{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #ddd;font-size:13px;background:#fafaf8;cursor:pointer;outline:none}
.lbl{font-size:11px;font-weight:600;color:#888;display:block;margin-bottom:3px}
.btn{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;color:#fff;transition:all .2s}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:10px 12px;border-bottom:2px solid #eee;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#999}
td{padding:10px 12px;border-bottom:1px solid #f4f3f0}
tr:hover td{background:#fafaf8}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600}
.bank-header{border-radius:16px;padding:24px 28px;margin-bottom:16px;position:relative;overflow:hidden}
.bank-header::before{content:'';position:absolute;top:-20px;right:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)}
.bank-header::after{content:'';position:absolute;bottom:-30px;right:40px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.05)}
.toggle{width:40px;height:22px;border-radius:11px;cursor:pointer;position:relative;transition:background .2s}
.toggle-knob{width:16px;height:16px;border-radius:8px;background:#fff;position:absolute;top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.edit-highlight{background:#fffbeb !important}
.edit-highlight-deb{background:#f3e8ff !important}
@media(max-width:768px){

  .nav{gap:2px}
  .nav-btn{padding:5px 10px;font-size:10px}

  const[view,setView]=useState("dashboard");

  const[ts,setTs]=useState(100);

  const[msiN,setMsiN]=useState(3);

  const bPos=useMemo(()=>bd.filter(r=>r.monto>0),[bd]);
  const bLeo=useMemo(()=>bPos.filter(r=>r.titular==="LEO").reduce((s,r)=>s+r.monto,0),[bPos]);
  const bMama=useMemo(()=>bPos.filter(r=>r.titular==="MAMÁ").reduce((s,r)=>s+r.monto,0),[bPos]);

  // Dashboard stats
  const ds=useMemo(()=>{
    const p=data.filter(r=>r.monto>0);
    const tL=p.filter(r=>r.titular==="LEO").reduce((s,r)=>s+r.monto,0);
    const tM=p.filter(r=>r.titular==="MAMÁ").reduce((s,r)=>s+r.monto,0);
    const byCat={};p.forEach(r=>{byCat[r.cat||"Otros"]=(byCat[r.cat||"Otros"]||0)+r.monto});
    const byBank={};BKS.forEach(b=>{byBank[b]=p.filter(r=>r.banco===b).reduce((s,r)=>s+r.monto,0)});
    return{tL,tM,total:tL+tM,byCat,byBank};

    const mp=parseFloat(form.monto);const cat=form.cat==="Otros"&&form.customCat?form.customCat:form.cat;

      const si=MO.indexOf(msiStart);const ne=[];let t=ts;

      {s.map(([c,v])=><div key={c} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0"}}>
        <div style={{width:8,height:8,borderRadius:3,background:CC[c]||"#999",flexShrink:0}}/>
        <div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{fontWeight:500}}>{c}</span><span style={{color:"#999"}}>{((v/tot)*100).toFixed(1)}%</span></div>
        <div style={{height:4,borderRadius:2,background:"#f0eeea",overflow:"hidden",marginTop:2}}><div style={{height:"100%",width:`${(v/mx)*100}%`,background:CC[c]||"#999",borderRadius:2}}/></div></div>
        <div style={{fontSize:12,fontWeight:600,minWidth:65,textAlign:"right"}}>{fmt(v)}</div>
      </div>)}
    </div>;
  };

  // Register form
  const RegForm=({banco})=><div className="card">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div className="card-title">{editId?"Editar":"Registrar"} — {BC[banco].name}</div>
      {editId&&<button onClick={cancelEdit} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#999"}}>✕ Cancelar</button>}
    </div>
    <div className={mob?"":"grid3"} style={mob?{display:"flex",flexDirection:"column",gap:10}:{marginBottom:14,gap:10}}>
      <div><label className="lbl">Fecha</label><input type="date" className="inp" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})}/></div>
      <div><label className="lbl">Monto</label><input type="number" step="0.01" className="inp" placeholder="0.00" value={form.monto} onChange={e=>setForm({...form,monto:e.target.value})}/></div>
      <div><label className="lbl">Titular</label><select className="sel" value={form.titular} onChange={e=>setForm({...form,titular:e.target.value})}>{OWNERS.map(o=><option key={o}>{o}</option>)}</select></div>
      <div><label className="lbl">Concepto</label><input className="inp" placeholder="Descripción..." value={form.concepto} onChange={e=>setForm({...form,concepto:e.target.value})}/></div>
      <div><label className="lbl">Categoría</label><select className="sel" value={form.cat} onChange={e=>setForm({...form,cat:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
      {form.cat==="Otros"&&<div><label className="lbl">Especificar</label><input className="inp" value={form.customCat} onChange={e=>setForm({...form,customCat:e.target.value})}/></div>}
    </div>
    {!editId&&<div style={{background:"#fafaf8",borderRadius:10,padding:"12px 16px",margin:"14px 0",border:"1px solid #ebe9e4"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:isMSI?10:0}}>
        <div className="toggle" style={{background:isMSI?BC[banco].color:"#ddd"}} onClick={()=>setIsMSI(!isMSI)}><div className="toggle-knob" style={{left:isMSI?21:3}}/></div>
        <span style={{fontSize:13,fontWeight:600}}>MSI</span></div>
      {isMSI&&<div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:6}}>
        <div><label className="lbl">Meses</label><select className="sel" style={{width:"auto"}} value={msiN} onChange={e=>setMsiN(+e.target.value)}>{[2,3,4,5,6,9,10,12,18,24].map(n=><option key={n} value={n}>{n}</option>)}</select></div>
        <div><label className="lbl">Desde</label><select className="sel" style={{width:"auto"}} value={msiStart} onChange={e=>setMsiStart(e.target.value)}>{MO.map(m=><option key={m}>{m}</option>)}</select></div>
        {form.monto&&<div style={{background:"#fff",padding:"6px 12px",borderRadius:8,border:"1px solid #eee",fontSize:12,alignSelf:"end"}}>{msiN}× {fmt(parseFloat(form.monto)||0)} = <strong>{fmt((parseFloat(form.monto)||0)*msiN)}</strong></div>}
      </div>}
    </div>}
    <div style={{display:"flex",gap:8,marginTop:10}}>
      {editId
        ?<button className="btn" style={{background:BC[banco].color}} onClick={saveEdit}>Guardar Cambios</button>
        :<button className="btn" style={{background:BC[banco].color}} onClick={()=>addEntry(banco)}>{isMSI?`Agregar ${msiN} MSI`:"Agregar"}</button>}
    </div>
  </div>;

  // Movements table
  const MovTbl=({items,onDel,onEdit})=><div className="card" style={{padding:0,overflow:"hidden"}}>
    <div style={{overflowX:"auto"}}><table>
      <thead><tr><th>Fecha</th><th>Concepto</th><th>Titular</th><th>Categoría</th><th style={{textAlign:"right"}}>Monto</th><th style={{width:60}}>Acc.</th></tr></thead>
      <tbody>{[...items].sort((a,b)=>(b._ts||0)-(a._ts||0)).map(r=><tr key={r.id} className={editId===r.id?"edit-highlight":""}>
        <td style={{fontSize:11,color:"#666"}}>{r.fecha}</td>
        <td style={{fontWeight:500,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.concepto}</td>
        <td><span className="tag" style={{background:r.titular==="LEO"?"#1a1a1a15":"#8b735515",color:r.titular==="LEO"?"#1a1a1a":"#8b7355"}}>{r.titular}</span></td>
        <td style={{fontSize:11,color:CC[r.cat]||"#999"}}>{r.cat}</td>
        <td style={{textAlign:"right",fontWeight:600,color:r.monto<0?"#16a34a":"#1a1a1a"}}>{fmt(r.monto)}</td>
        <td style={{whiteSpace:"nowrap"}}><button onClick={()=>onEdit(r)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,padding:2,marginRight:4}}>✎</button><button onClick={()=>onDel(r.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:13,padding:2}}>✕</button></td>
      </tr>)}</tbody>
    </table></div>
  </div>;

  return <div>
    {/* Header */}
    <div className="header">
      <div className="logo">vault<span>.leo</span></div>
      <div className="nav">
        {["dashboard",...BKS,"NuDeb"].map(v=>{
          const active=(view==="bank"&&bv===v)||view===v;
          const label=v==="NuDeb"?"Nu Débito":v==="dashboard"?"Dashboard":BC[v]?.name||v;
          const color=BC[v]?.color||"#1a1a1a";
          return <button key={v} className={`nav-btn${active?" active":""}`} style={active?{background:color}:{}} onClick={()=>{
            if(BKS.includes(v)){setView("bank");setBv(v)}else setView(v);cancelEdit();cancelEditDeb();
          }}>{label}</button>
        })}
      </div>
    </div>

    <div className="container">
      {/* ═══ DASHBOARD ═══ */}
      {view==="dashboard"&&<>
        <div className={mob?"":"grid3"} style={mob?{display:"flex",flexDirection:"column",gap:12}:{marginBottom:14}}>
          <div className="card"><div className="card-title">Total Cargos</div><div className="big-num">{fmt(ds.total)}</div><div style={{fontSize:12,color:"#999",marginTop:5}}>{data.filter(r=>r.monto>0).length} movimientos</div></div>
          <div className="card"><div className="card-title">Leo</div><div className="big-num">{fmt(ds.tL)}</div><div style={{fontSize:12,color:"#999",marginTop:5}}>{((ds.tL/(ds.total||1))*100).toFixed(1)}%</div></div>
          <div className="card"><div className="card-title">Mamá</div><div className="big-num" style={{color:"#8b7355"}}>{fmt(ds.tM)}</div><div style={{fontSize:12,color:"#999",marginTop:5}}>{((ds.tM/(ds.total||1))*100).toFixed(1)}%</div></div>
        </div>

        <div className="card"><div className="card-title">Próximos Pagos — Abril 2026</div>
          <div className={mob?"":"grid2"} style={mob?{display:"flex",flexDirection:"column",gap:10}:{gap:10}}>
            {BKS.map(b=>{const items=data.filter(r=>r.banco===b&&r.monto>0);const tot=items.reduce((s,r)=>s+r.monto,0);const leo=items.filter(r=>r.titular==="LEO").reduce((s,r)=>s+r.monto,0);const mama=items.filter(r=>r.titular==="MAMÁ").reduce((s,r)=>s+r.monto,0);const c=BC[b];
              return <div key={b} style={{background:c.grad,borderRadius:12,padding:"16px 18px",color:c.text}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span style={{fontSize:13,fontWeight:700}}>{c.name}</span><span style={{fontSize:10,opacity:.6}}>Pago: día {c.pago}</span></div>
                <div style={{fontSize:22,fontWeight:700,marginBottom:6}}>{fmt(tot)}</div>
                <div style={{display:"flex",gap:16,fontSize:11}}><span>Leo: {fmt(leo)}</span><span style={{opacity:.7}}>Mamá: {fmt(mama)}</span></div>
              </div>})}
          </div>
        </div>

        <div className="card"><div className="card-title">Distribución por Banco</div>
          {BKS.map(b=>{const v=ds.byBank[b]||0;const pct=(v/(ds.total||1))*100;
            return <div key={b} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0"}}>
              <div style={{width:80,fontSize:12,fontWeight:500}}>{b}</div>
              <div style={{flex:1,height:8,borderRadius:4,background:"#f0eeea",overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:BC[b].color,borderRadius:4,transition:"width .5s"}}/></div>
              <div style={{fontSize:12,fontWeight:600,minWidth:80,textAlign:"right"}}>{fmt(v)}</div>
            </div>})}
        </div>

        <CatChart items={data}/>

        <div className="card"><div className="card-title">Últimos Registros</div>
          {[...data].sort((a,b)=>(b._ts||0)-(a._ts||0)).slice(0,12).map((r,i)=><div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<11?"1px solid #f4f3f0":"none"}}>
            <div style={{width:6,height:6,borderRadius:3,background:BC[r.banco]?.color||"#999"}}/>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.concepto}</div>
            <div style={{fontSize:10,color:"#aaa"}}>{r.banco} · {r.fecha} · <span style={{color:r.titular==="LEO"?"#555":"#8b7355"}}>{r.titular}</span></div></div>
            <div style={{fontSize:13,fontWeight:600,color:r.monto<0?"#16a34a":"#1a1a1a"}}>{fmt(r.monto)}</div>
          </div>)}
        </div>
      </>}

      {/* ═══ BANK VIEW ═══ */}
      {view==="bank"&&<>
        <div className="bank-header" style={{background:BC[bv].grad,color:BC[bv].text}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:2,opacity:.5,marginBottom:6}}>{BC[bv].name}</div>
          <div style={{fontSize:32,fontWeight:700,letterSpacing:"-1px",marginBottom:8}}>{fmt(bLeo+bMama)}</div>
          <div style={{display:"flex",gap:24,marginBottom:10}}>
            <div><div style={{fontSize:10,opacity:.5}}>Leo</div><div style={{fontSize:15,fontWeight:600}}>{fmt(bLeo)}</div></div>
            <div><div style={{fontSize:10,opacity:.5}}>Mamá</div><div style={{fontSize:15,fontWeight:600}}>{fmt(bMama)}</div></div>
          </div>
          <div style={{background:"rgba(255,255,255,.1)",borderRadius:8,padding:"8px 12px",fontSize:12}}>
            <span style={{opacity:.7}}>Corte: día {BC[bv].corte}</span> · <span style={{fontWeight:600}}>Pago límite: día {BC[bv].pago} de Abril 2026</span>
          </div>
        </div>
        <CatChart items={bd}/>
        <RegForm banco={bv}/>
        <div className="card-title" style={{marginTop:8}}>Movimientos — {BC[bv].name}</div>
        <MovTbl items={bd} onDel={delEntry} onEdit={startEdit}/>
      </>}

      {/* ═══ NU DÉBITO ═══ */}
      {view==="NuDeb"&&<>
        <div className="bank-header" style={{background:BC.NuDeb.grad,color:BC.NuDeb.text}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:2,opacity:.5,marginBottom:6}}>Nu Débito — Gastos Personales</div>
          <div style={{fontSize:32,fontWeight:700,marginBottom:4}}>{fmt(nudeb.reduce((s,r)=>s+r.monto,0))}</div>
          <div style={{fontSize:12,opacity:.6}}>{nudeb.length} movimientos</div>
        </div>
        {nudeb.length>0&&<CatChart items={nudeb.map(r=>({...r,titular:"LEO"}))}/>}
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div className="card-title">{editDebId?"Editar":"Registrar"} — Nu Débito</div>
            {editDebId&&<button onClick={cancelEditDeb} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#999"}}>✕ Cancelar</button>}
          </div>
          <div className={mob?"":"grid3"} style={mob?{display:"flex",flexDirection:"column",gap:10}:{marginBottom:14,gap:10}}>
            <div><label className="lbl">Fecha</label><input type="date" className="inp" value={debForm.fecha} onChange={e=>setDebForm({...debForm,fecha:e.target.value})}/></div>
            <div><label className="lbl">Monto</label><input type="number" step="0.01" className="inp" placeholder="0.00" value={debForm.monto} onChange={e=>setDebForm({...debForm,monto:e.target.value})}/></div>
            <div><label className="lbl">Categoría</label><select className="sel" value={debForm.cat} onChange={e=>setDebForm({...debForm,cat:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
            <div style={mob?{}:{gridColumn:"1/-1"}}><label className="lbl">Concepto</label><input className="inp" placeholder="¿En qué gastaste?" value={debForm.concepto} onChange={e=>setDebForm({...debForm,concepto:e.target.value})}/></div>
            {debForm.cat==="Otros"&&<div><label className="lbl">Especificar</label><input className="inp" value={debForm.customCat} onChange={e=>setDebForm({...debForm,customCat:e.target.value})}/></div>}
          </div>
          <button className="btn" style={{background:"#820ad1",marginTop:10}} onClick={editDebId?saveEditDeb:addDebEntry}>{editDebId?"Guardar Cambios":"Registrar Gasto"}</button>
        </div>
        {nudeb.length>0&&<div className="card" style={{padding:0,overflow:"hidden"}}><div style={{overflowX:"auto"}}><table>
          <thead><tr><th>Fecha</th><th>Concepto</th><th>Categoría</th><th style={{textAlign:"right"}}>Monto</th><th style={{width:60}}>Acc.</th></tr></thead>
          <tbody>{[...nudeb].sort((a,b)=>(b._ts||0)-(a._ts||0)).map(r=><tr key={r.id} className={editDebId===r.id?"edit-highlight-deb":""}>
            <td style={{fontSize:11,color:"#666"}}>{r.fecha}</td><td style={{fontWeight:500}}>{r.concepto}</td>
            <td style={{fontSize:11,color:CC[r.cat]||"#999"}}>{r.cat}</td>
            <td style={{textAlign:"right",fontWeight:600}}>{fmt(r.monto)}</td>
            <td style={{whiteSpace:"nowrap"}}><button onClick={()=>startEditDeb(r)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,padding:2,marginRight:4}}>✎</button><button onClick={()=>delDeb(r.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:13,padding:2}}>✕</button></td>
          </tr>)}</tbody>
        </table></div></div>}
      </>}

      <div style={{textAlign:"center",padding:"28px 0 14px",fontSize:11,color:"#bbb"}}>vault.leo — finanzas personales</div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
